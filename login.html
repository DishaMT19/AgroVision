<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 AgroVision · Sign In</title>
  <!-- Font Awesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* Light mode variables (matching AgroVision) */
    :root {
      --bg-gradient-start: #e3f0e3;
      --bg-gradient-end: #c8ddc8;
      --text-primary: #1e2f1e;
      --text-secondary: #1e3f1e;
      --card-bg: rgba(255, 255, 255, 0.3);
      --card-border: rgba(255, 255, 255, 0.6);
      --navbar-bg: rgba(255, 255, 255, 0.25);
      --input-bg: rgba(255, 255, 255, 0.5);
      --btn-bg: rgba(31, 95, 31, 0.85);
      --btn-hover: rgba(43, 122, 43, 0.9);
      --shadow-color: rgba(0, 40, 0, 0.2);
      --icon-color: #2b7a2b;
      --border-color: rgba(160, 200, 160, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.25);
    }

    body.dark-mode {
      --bg-gradient-start: #0a1f0a;
      --bg-gradient-end: #1a2e1a;
      --text-primary: #d0e0d0;
      --text-secondary: #b0d0b0;
      --card-bg: rgba(10, 30, 10, 0.6);
      --card-border: rgba(80, 120, 80, 0.5);
      --navbar-bg: rgba(0, 20, 0, 0.5);
      --input-bg: rgba(40, 70, 40, 0.7);
      --btn-bg: rgba(60, 100, 60, 0.9);
      --btn-hover: rgba(80, 140, 80, 0.9);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --icon-color: #8bc34a;
      --border-color: rgba(80, 120, 80, 0.5);
      --glass-bg: rgba(0, 30, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      transition: background 0.3s, color 0.3s;
      padding: 1.5rem;
    }

    /* Floating leaf animation in background */
    body::before {
      content: "🌿";
      position: fixed;
      font-size: 8rem;
      bottom: 20px;
      left: 20px;
      opacity: 0.1;
      transform: rotate(-15deg);
      pointer-events: none;
      z-index: 0;
      animation: floatLeaf 8s infinite ease-in-out;
    }

    body::after {
      content: "🍃";
      position: fixed;
      font-size: 10rem;
      top: 10px;
      right: 30px;
      opacity: 0.1;
      transform: rotate(20deg);
      pointer-events: none;
      z-index: 0;
      animation: floatLeaf 10s infinite reverse;
    }

    @keyframes floatLeaf {
      0% { transform: translateY(0) rotate(-15deg); }
      50% { transform: translateY(-25px) rotate(-10deg); }
      100% { transform: translateY(0) rotate(-15deg); }
    }

    /* Main login card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 40px -12px var(--shadow-color);
      border: 1px solid var(--card-border);
      transition: transform 0.3s ease, box-shadow 0.3s;
    }

    .login-card:hover {
      transform: scale(1.01);
      box-shadow: 0 30px 50px -15px #1f4a1f;
    }

    /* Logo area */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .login-logo i {
      font-size: 2.8rem;
      color: var(--icon-color);
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .login-logo h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .welcome-text h2 {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .welcome-text p {
      color: var(--text-secondary);
      margin-top: 0.4rem;
      font-size: 1rem;
    }

    /* Form styles */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
      margin-left: 0.5rem;
    }

    .input-group label i {
      color: var(--icon-color);
      width: 20px;
    }

    .input-field {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 0.2rem 1.5rem;
      border: 2px solid transparent;
      transition: all 0.2s;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
    }

    .input-field:focus-within {
      border-color: var(--icon-color);
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 0 4px rgba(43, 122, 43, 0.1);
    }

    .input-field i {
      color: var(--text-secondary);
      margin-right: 12px;
      font-size: 1.1rem;
    }

    .input-field input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 1rem 0;
      font-size: 1.1rem;
      color: var(--text-primary);
      outline: none;
    }

    .input-field input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
      font-weight: 300;
    }

    /* Password toggle */
    .password-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .toggle-pw {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-pw:hover {
      background: rgba(0,0,0,0.05);
      color: var(--icon-color);
    }

    /* Options row */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -0.3rem;
      font-size: 0.95rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
    }

    .remember input {
      accent-color: #2b7a2b;
      width: 18px;
      height: 18px;
    }

    .forgot-link {
      color: var(--icon-color);
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .forgot-link:hover {
      text-decoration: underline;
      opacity: 0.9;
    }

    /* Login button */
    .login-btn {
      background: var(--btn-bg);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 1rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 18px var(--shadow-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.8rem;
    }

    .login-btn:hover {
      background: var(--btn-hover);
      transform: scale(1.02);
      box-shadow: 0 12px 22px rgba(30, 90, 30, 0.3);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin: 1.5rem 0 1rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .divider span {
      padding: 0 1rem;
      opacity: 0.8;
    }

    /* Social / demo login */
    .social-login {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--card-border);
      border-radius: 60px;
      padding: 0.8rem;
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
    }

    .social-btn i {
      color: var(--icon-color);
    }

    .social-btn:hover {
      background: rgba(70, 130, 70, 0.2);
      transform: translateY(-2px);
      border-color: var(--icon-color);
    }

    /* Sign up link */
    .signup-prompt {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-secondary);
    }

    .signup-prompt a {
      color: var(--icon-color);
      font-weight: 700;
      text-decoration: none;
      margin-left: 5px;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    /* Back to home */
    .back-home {
      display: block;
      text-align: center;
      margin-top: 1.8rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .back-home i {
      margin-right: 6px;
    }

    .back-home:hover {
      color: var(--icon-color);
    }

    /* Theme toggle inside card (small) */
    .theme-toggle-wrapper {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
    }

    .dark-toggle {
      background: var(--glass-bg);
      border: 2px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .dark-toggle:hover {
      transform: scale(1.1);
      background: rgba(80, 140, 80, 0.3);
    }

    .dark-toggle i {
      font-size: 1.3rem;
    }

    /* Demo note */
    .demo-note {
      background: rgba(220, 240, 220, 0.3);
      border-radius: 40px;
      padding: 0.6rem 1rem;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text-secondary);
      border: 1px dashed var(--icon-color);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      .login-logo h1 {
        font-size: 1.9rem;
      }
      .social-login {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    
    <!-- tiny dark mode toggle -->
    <div class="theme-toggle-wrapper">
      <div class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
      </div>
    </div>

    <div class="login-logo">
      <i class="fas fa-leaf"></i>
      <h1>AgroVision</h1>
    </div>

    <div class="welcome-text">
      <h2>Welcome back</h2>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <div class="input-field">
          <i class="fas fa-user"></i>
          <input type="email" id="email" placeholder="farmer@AgroVision.com" value="demo@AgroVision.com" required>
        </div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="input-field">
          <i class="fas fa-key"></i>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" value="demo123" required>
          </div>
          <button type="button" class="toggle-pw" onclick="togglePassword()" title="Show/hide password">
            <i class="far fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox" checked> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="divider">
      <span>or continue with</span>
    </div>

    <div class="social-login">
      <button class="social-btn" onclick="alert('🌿 Demo: Google sign-in would open')">
        <i class="fab fa-google"></i> Google
      </button>
      <button class="social-btn" onclick="alert('🍃 Demo: GitHub sign-in would open')">
        <i class="fab fa-github"></i> GitHub
      </button>
    </div>

    <div class="signup-prompt">
      New to AgroVision? <a href="#" onclick="alert('✨ Demo: Sign up page would open'); return false;">Create an account</a>
    </div>

    <a href="#" class="back-home" onclick="goToMainDemo(); return false;">
      <i class="fas fa-arrow-left"></i> Back to AgroVision demo
    </a>

    <div class="demo-note">
      <i class="fas fa-flask"></i> Demo credentials: demo@AgroVision.com / demo123
    </div>
  </div>
</div>

<script>
  // Dark mode toggle (shared with AgroVision style)
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const icon = document.querySelector('#darkToggle i');
    if (document.body.classList.contains('dark-mode')) {
      icon.classList.remove('fa-moon');
      icon.classList.add('fa-sun');
    } else {
      icon.classList.remove('fa-sun');
      icon.classList.add('fa-moon');
    }
  }

  // Password visibility toggle
  function togglePassword() {
    const pwField = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (pwField.type === 'password') {
      pwField.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      pwField.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  // Handle login (demo)
  function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Demo validation (just a friendly message)
    if (email && password) {
      alert(`🌱 Welcome to AgroVision, ${email}!\nRedirecting to home page...`);
      window.location.href = 'index.html';
    } else {
      alert('Please enter email and password.');
    }
  }

  // Return to main AgroVision demo (simulate)
  function goToMainDemo() {
    // Since this is a standalone login, we can show a message 
    // and optionally navigate back if opened from main page.
    if (document.referrer && document.referrer.includes('AgroVision')) {
      window.history.back();
    } else {
      alert('🌿 Returning to AgroVision disease finder demo.\n(In a real app, this would open the main dashboard.)');
      // You can replace with actual redirect:
      // window.location.href = 'index.html';
    }
  }

  // Prefill demo note action (already prefilled)
  window.addEventListener('DOMContentLoaded', () => {
    // Optional: focus on email
    document.getElementById('email').focus();
  });

  // Keyboard shortcut hint
  console.log('🌿 AgroVision Login — use demo@AgroVision.com / demo123');
</script>

<!-- Add subtle styling for eye icon in dark mode -->
<style>
  body.dark-mode .input-field input {
    color: #e0f0e0;
  }
  body.dark-mode .input-field input::placeholder {
    color: #a0c0a0;
  }
  .fa-eye, .fa-eye-slash {
    pointer-events: none;
  }
  .toggle-pw {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Smooth transitions */
  .login-card, .input-field, .login-btn, .social-btn {
    transition: background 0.3s, border 0.3s, transform 0.2s, box-shadow 0.2s;
  }
  /* Remember checkbox style */
  .remember input {
    cursor: pointer;
  }
</style>

</body>
</html>
